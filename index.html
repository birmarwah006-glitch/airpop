<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirPop Live</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  text-align: center;
  padding: 40px 20px;
  min-height: 100vh;
}

h1 { font-size: 2rem; font-weight: 700; color: #78dcff; letter-spacing: 2px; margin-bottom: 4px; }
h1 span { color: #fff; }
.sub { font-size: 12px; color: rgba(255,255,255,0.28); letter-spacing: 1px; margin-bottom: 22px; }

#serverStatus {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 12px; color: rgba(255,255,255,0.32); margin-bottom: 18px;
}
#statusDot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: background .3s; }

.controls { margin-bottom: 14px; }

button {
  padding: 9px 20px; margin: 4px;
  background: rgba(120,220,255,0.08); color: #78dcff;
  border: 1px solid rgba(120,220,255,0.32); border-radius: 8px;
  cursor: pointer; font-weight: 600; font-size: 13px;
  transition: background .15s, border-color .15s;
}
button:hover { background: rgba(120,220,255,0.16); border-color: rgba(120,220,255,0.6); }

.hidden { display: none !important; }

#peerStatus { min-height: 20px; font-size: 13px; color: rgba(255,255,255,0.42); margin-bottom: 14px; }

#sendCard { max-width: 440px; margin: 0 auto 20px; }

#dropZone {
  border: 2px dashed rgba(120,220,255,0.25); padding: 28px 20px;
  border-radius: 12px; cursor: pointer; font-size: 14px;
  color: rgba(255,255,255,0.38); line-height: 1.6;
  transition: background .2s, border-color .2s, box-shadow .2s;
}
#dropZone:hover, #dropZone.dragover { background: rgba(120,220,255,0.05); border-color: rgba(120,220,255,0.55); }
#dropZone.gesture-hover { border-color: #78dcff; background: rgba(120,220,255,0.07); box-shadow: 0 0 18px rgba(120,220,255,0.18); }
#dropZone.file-ready    { border-color: #4ade80; background: rgba(74,222,128,0.05);  box-shadow: 0 0 18px rgba(74,222,128,0.14); }

#dzIcon { font-size: 2rem; margin-bottom: 8px; }
#gestureHint { margin-top: 10px; font-size: 11px; color: rgba(120,220,255,0.32); line-height: 1.9; }

#fileReadyBanner { margin-top: 8px; font-size: 13px; color: #4ade80; min-height: 18px; }

/* send button */
#sendBtn {
  margin-top: 12px;
  width: 100%;
  padding: 11px;
  background: rgba(74,222,128,0.12);
  color: #4ade80;
  border: 1px solid rgba(74,222,128,0.4);
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
}
#sendBtn:hover { background: rgba(74,222,128,0.22); }

#progressWrap { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; margin-top: 12px; }
#progressBar  { height: 100%; width: 0; background: linear-gradient(90deg,#78dcff,#4ade80); border-radius: 4px; transition: width .1s; }
#progressLbl  { margin-top: 4px; font-size: 11px; color: rgba(255,255,255,0.28); text-align: right; }

#receiveCard { max-width: 440px; margin: 0 auto 20px; text-align: left; }
#receiveCard h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
#receivedArea img, #receivedArea video { max-width: 100%; border-radius: 8px; margin-top: 8px; display: block; }
.file-item { padding: 8px 12px; background: rgba(255,255,255,0.04); border-radius: 8px; margin-top: 6px; font-size: 13px; }
.file-item a { color: #78dcff; }

#log {
  max-width: 440px; margin: 0 auto;
  background: rgba(0,0,0,0.22); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 8px; padding: 10px 12px; font-size: 11px;
  max-height: 150px; overflow-y: auto; text-align: left;
  color: rgba(255,255,255,0.26); line-height: 1.7;
}
#log .success { color: #4ade80; }
#log .error   { color: #ff4d6d; }
#log .info    { color: #78dcff; }
</style>

        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

</head>
<body>

<h1>Air<span>Pop</span> Live</h1>
<p class="sub">Instant P2P File Transfer</p>

<div id="serverStatus">
  <span id="statusDot"></span>
  <span id="statusText">Connecting...</span>
</div>

<div class="controls">
  <button id="connectBtn">Connect</button>
  <button id="cancelBtn"     class="hidden">Cancel</button>
  <button id="disconnectBtn" class="hidden">Disconnect</button>
</div>

<div id="peerStatus"></div>

<div id="sendCard" class="hidden">
  <div id="dropZone">
    <div id="dzIcon">📁</div>
    <div id="dzText">Drop files here or click to select</div>
    <div id="gestureHint">
      👆 Double-push to pick &nbsp;·&nbsp; ✊ Fist to grab &nbsp;·&nbsp; 🖐 Open to send
    </div>
  </div>
  <input type="file" id="fileInput" multiple hidden>

  <!--
    Ghost file picker (Option 1+3 combo):
    An invisible <button> containing an <input type="file"> that
    follows the gesture cursor at all times. When double-push fires,
    we move this element directly under the cursor and click it.
    The browser sees a real pointer event on a real input element
    and allows the file picker to open.
  -->
  <button id="ghostPickerBtn" style="
    position:fixed;
    width:1px; height:1px;
    opacity:0;
    pointer-events:none;
    padding:0; margin:0; border:none;
    z-index:99999;
    overflow:hidden;
  " tabindex="-1">
    <input type="file" id="ghostFileInput" multiple style="
      position:absolute;
      width:60px; height:60px;
      opacity:0;
      cursor:pointer;
      top:0; left:0;
    ">
  </button>
  <div id="fileReadyBanner"></div>
  <!-- explicit send button so normal (non-gesture) flow always works -->
  <button id="sendBtn" class="hidden">🚀 Send Selected Files</button>
  <div id="progressWrap" style="display:none;"><div id="progressBar"></div></div>
  <div id="progressLbl"></div>
</div>

<div id="receiveCard" class="hidden">
  <h3>Received Files</h3>
  <div id="receivedArea"></div>
</div>

<div id="log"></div>

<script src="/socket.io/socket.io.js"></script>

<!-- MediaPipe: loaded from local node_modules via server.js static routes -->
<script src="/mediapipe/hands.js"></script>
<script src="/mediapipe/camera_utils.js"></script>

<!-- ================================================================
     CLIENT
     ================================================================ -->
<script>
var ICE_SERVERS = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
    { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" }
  ]
};
var CHUNK_SIZE = 65536;

var socket, pc = null, dc = null, peerId = null;
var rxBuf = { chunks: [], meta: null };

/* DOM */
var statusDot      = document.getElementById("statusDot");
var statusText     = document.getElementById("statusText");
var connectBtn     = document.getElementById("connectBtn");
var cancelBtn      = document.getElementById("cancelBtn");
var disconnectBtn  = document.getElementById("disconnectBtn");
var sendCard       = document.getElementById("sendCard");
var receiveCard    = document.getElementById("receiveCard");
var receivedArea   = document.getElementById("receivedArea");
var dropZone       = document.getElementById("dropZone");
var fileInput      = document.getElementById("fileInput");
var ghostBtn       = document.getElementById("ghostPickerBtn");
var ghostInput     = document.getElementById("ghostFileInput");
var fileReadyBanner= document.getElementById("fileReadyBanner");
var sendBtn        = document.getElementById("sendBtn");
var progressWrap   = document.getElementById("progressWrap");
var progressBar    = document.getElementById("progressBar");
var progressLbl    = document.getElementById("progressLbl");
var logEl          = document.getElementById("log");
var peerStatus     = document.getElementById("peerStatus");

/* shared with gesture block */
var gestureState = { filesReady: false };

/* staged files from picker OR drag-drop */
var stagedFiles = [];

function write(msg, type) {
  var d = document.createElement("div");
  d.className   = type || "";
  d.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function setServer(ok) {
  statusDot.style.background = ok ? "#4ade80" : "#ff4d6d";
  statusText.textContent     = ok ? "Server connected ✔" : "Disconnected ❌";
}

function setState(s) {
  connectBtn.classList.add("hidden");
  cancelBtn.classList.add("hidden");
  disconnectBtn.classList.add("hidden");
  sendCard.classList.add("hidden");
  peerStatus.textContent = "";
  if (s === "idle") {
    connectBtn.classList.remove("hidden");
  } else if (s === "searching") {
    cancelBtn.classList.remove("hidden");
    peerStatus.textContent = "🔍 Searching for a peer...";
  } else if (s === "connected") {
    disconnectBtn.classList.remove("hidden");
    sendCard.classList.remove("hidden");
    peerStatus.textContent = "✅ Peer connected — send files below!";
  }
}

/* stage files from picker or drop, show send button */
function stageFiles(files) {
  stagedFiles = Array.from(files);
  gestureState.filesReady = true;
  dropZone.classList.add("file-ready");
  fileReadyBanner.textContent = "✅ " + stagedFiles.length + " file(s) ready";
  sendBtn.classList.remove("hidden");
  write(stagedFiles.length + " file(s) staged", "info");
}

function clearStaged() {
  stagedFiles = [];
  gestureState.filesReady = false;
  dropZone.classList.remove("file-ready");
  fileReadyBanner.textContent = "";
  sendBtn.classList.add("hidden");
  fileInput.value = "";
}

/* send all staged files — called by button AND gesture */
function sendStagedFiles() {
  if (stagedFiles.length === 0) {
    write("No files staged.", "error"); return;
  }
  stagedFiles.forEach(sendFile);
  clearStaged();
}

/* alias for gesture block */
function gestureSendFiles() { sendStagedFiles(); }

/* ---- socket ---- */
function initSocket() {
  socket = io(window.location.origin);
  socket.on("connect",          function() { setServer(true);  setState("idle"); write("Connected to server", "success"); });
  socket.on("disconnect",       function() { setServer(false); write("Disconnected", "error"); });
  socket.on("connect_error",    function(e){ write("Socket error: " + e.message, "error"); });
  socket.on("waiting",          function() { setState("searching"); write("Waiting for peer...", "info"); });
  socket.on("search-cancelled", function() { setState("idle"); write("Search cancelled", "info"); });
  socket.on("matched", function(d) {
    peerId = d.peerId;
    write("Matched! Connecting P2P...", "info");
    setupPeer(d.initiator);
  });
  socket.on("offer", async function(d) {
    if (!pc) setupPeer(false);
    await pc.setRemoteDescription(new RTCSessionDescription(d.offer));
    var ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    socket.emit("answer", { to: d.from, answer: ans });
  });
  socket.on("answer", async function(d) {
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(d.answer));
  });
  socket.on("ice-candidate", async function(d) {
    if (pc) { try { await pc.addIceCandidate(new RTCIceCandidate(d.candidate)); } catch(e){} }
  });
  socket.on("peer-left", function() {
    write("Peer disconnected", "error"); closePeer(); setState("idle");
  });
}

/* ---- WebRTC ---- */
function setupPeer(initiator) {
  pc = new RTCPeerConnection(ICE_SERVERS);
  pc.onicecandidate = function(e) {
    if (e.candidate) socket.emit("ice-candidate", { to: peerId, candidate: e.candidate });
  };
  pc.onconnectionstatechange = function() {
    write("P2P: " + pc.connectionState, pc.connectionState === "connected" ? "success" : "");
    if (pc.connectionState === "connected")  setState("connected");
    if (pc.connectionState === "failed" || pc.connectionState === "disconnected") {
      write("P2P lost", "error"); closePeer(); setState("idle");
    }
  };
  if (initiator) {
    dc = pc.createDataChannel("airpop", { ordered: true });
    setupDC(dc);
    pc.createOffer().then(function(o) {
      pc.setLocalDescription(o);
      socket.emit("offer", { to: peerId, offer: o });
    });
  } else {
    pc.ondatachannel = function(e) { dc = e.channel; setupDC(dc); };
  }
}

function closePeer() {
  if (pc) { pc.close(); pc = null; }
  dc = null; peerId = null;
}

/* ---- data channel ---- */
function setupDC(chan) {
  chan.binaryType = "arraybuffer";
  chan.onopen  = function() { write("File channel open ✔", "success"); };
  chan.onclose = function() { write("File channel closed"); };
  chan.onmessage = function(e) {
    if (typeof e.data === "string") {
      var msg = JSON.parse(e.data);
      if (msg.type === "file-start") {
        rxBuf = { chunks: [], meta: msg };
        write("Receiving: " + msg.name + " (" + fmtSize(msg.size) + ")", "info");
        receiveCard.classList.remove("hidden");
      } else if (msg.type === "file-end") {
        finalizeFile();
      }
    } else {
      rxBuf.chunks.push(e.data);
    }
  };
}

function finalizeFile() {
  var meta = rxBuf.meta;
  var blob = new Blob(rxBuf.chunks, { type: meta.fileType });
  var url  = URL.createObjectURL(blob);
  if (meta.fileType.startsWith("image/")) {
    var img = document.createElement("img"); img.src = url; img.title = meta.name;
    receivedArea.appendChild(img);
  } else if (meta.fileType.startsWith("video/")) {
    var v = document.createElement("video"); v.src = url; v.controls = true;
    receivedArea.appendChild(v);
  } else {
    var d = document.createElement("div"); d.className = "file-item";
    d.innerHTML = "📄 <a href='" + url + "' download='" + meta.name + "'>" + meta.name + "</a> (" + fmtSize(meta.size) + ")";
    receivedArea.appendChild(d);
  }
  write("Received: " + meta.name + " ✔", "success");
  rxBuf = { chunks: [], meta: null };
}

function fmtSize(b) {
  if (b < 1024)    return b + " B";
  if (b < 1048576) return (b/1024).toFixed(1) + " KB";
  return (b/1048576).toFixed(1) + " MB";
}

async function sendFile(file) {
  if (!dc || dc.readyState !== "open") { write("Data channel not open.", "error"); return; }
  write("Sending: " + file.name + " (" + fmtSize(file.size) + ")", "info");
  var buf   = await file.arrayBuffer();
  var total = Math.ceil(buf.byteLength / CHUNK_SIZE);
  progressWrap.style.display = "block";
  dc.send(JSON.stringify({ type:"file-start", name:file.name, size:buf.byteLength, fileType:file.type||"application/octet-stream" }));
  for (var i = 0; i < total; i++) {
    var start = i * CHUNK_SIZE;
    var chunk = buf.slice(start, start + CHUNK_SIZE);
    while (dc.bufferedAmount > 1048576) { await new Promise(function(r){ setTimeout(r,50); }); }
    dc.send(chunk);
    var pct = Math.round(((i+1)/total)*100);
    progressBar.style.width = pct + "%";
    progressLbl.textContent = file.name + " — " + pct + "%";
  }
  dc.send(JSON.stringify({ type:"file-end" }));
  write("Sent: " + file.name + " ✔", "success");
  setTimeout(function() {
    progressWrap.style.display = "none";
    progressBar.style.width = "0";
    progressLbl.textContent = "";
  }, 2000);
}

/* ---- button events ---- */
connectBtn.addEventListener("click",    function(){ socket.emit("find-peer"); setState("searching"); write("Searching...", "info"); });
cancelBtn.addEventListener("click",     function(){ socket.emit("cancel-search"); });
disconnectBtn.addEventListener("click", function(){ closePeer(); setState("idle"); write("Disconnected", "info"); });
sendBtn.addEventListener("click",       function(){ sendStagedFiles(); });

/* ---- drop zone ---- */
dropZone.addEventListener("click", function(){ fileInput.click(); });
dropZone.addEventListener("dragover",  function(e){ e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", function(){  dropZone.classList.remove("dragover"); });
dropZone.addEventListener("drop", function(e) {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files.length) stageFiles(e.dataTransfer.files);
});

/* ---- file picker — stage, don't auto-send ---- */
fileInput.addEventListener("change", function() {
  if (fileInput.files.length > 0) stageFiles(fileInput.files);
});

/* ghost picker (used by gesture double-push) */
ghostInput.addEventListener("change", function() {
  if (ghostInput.files.length > 0) stageFiles(ghostInput.files);
});

initSocket();
</script>

<!-- ================================================================
     GESTURE  (inline IIFE — no separate file needed)
     ================================================================ -->
<script>
(function() {

var CFG = {
  minDetection:    0.70,
  minTracking:     0.50,
  smoothing:       0.55,
  grabFrames:      4,
  sendFrames:      3,
  pushZThreshold:  0.045,
  pushResetFrames: 10,
  doublePushMs:    800
};

var running    = false;
var gx = 0, gy = 0;
var grabCount  = 0, sendCount  = 0;
var isGrabbing = false, hasSent = false;
var lastWristZ = null, pushCooldown = 0;
var firstPushAt = null, pushCount = 0, pushTimer = null;

function el(id){ return document.getElementById(id); }

function overDropZone(x, y) {
  var r = dropZone.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

/* finger curl: tip closer to wrist than knuckle */
function isCurled(lm, tipIdx, mcpIdx) {
  var w = lm[0], t = lm[tipIdx], m = lm[mcpIdx];
  var td = Math.sqrt((t.x-w.x)*(t.x-w.x)+(t.y-w.y)*(t.y-w.y)+(t.z-w.z)*(t.z-w.z));
  var md = Math.sqrt((m.x-w.x)*(m.x-w.x)+(m.y-w.y)*(m.y-w.y)+(m.z-w.z)*(m.z-w.z));
  return td < md * 1.2;
}

function classify(lm) {
  var i = isCurled(lm,8,5), m = isCurled(lm,12,9), r = isCurled(lm,16,13), p = isCurled(lm,20,17);
  var n = (i?1:0)+(m?1:0)+(r?1:0)+(p?1:0);
  if (n >= 3) return "fist";
  if (n === 0) return "open";
  return "point";
}

function smoothCursor(lm) {
  var tip = lm[8];
  var rx = (1 - tip.x) * window.innerWidth;
  var ry = tip.y * window.innerHeight;
  var f  = CFG.smoothing;
  gx = gx*f + rx*(1-f);
  gy = gy*f + ry*(1-f);
  return { x: gx, y: gy };
}

function detectPush(lm) {
  var wz = lm[0].z;
  if (pushCooldown > 0) { pushCooldown--; lastWristZ = wz; return false; }
  if (lastWristZ === null) { lastWristZ = wz; return false; }
  var delta = lastWristZ - wz;
  lastWristZ = wz;
  if (delta > CFG.pushZThreshold) { pushCooldown = CFG.pushResetFrames; return true; }
  return false;
}

function onPush(pos) {
  var now   = Date.now();
  var flash = el("gFlash");
  var badge = el("gBadge");
  var on_dz = overDropZone(pos.x, pos.y);

  flash.style.opacity = "1";
  setTimeout(function(){ flash.style.opacity = "0"; }, 140);

  if (pushCount === 0 || (now - firstPushAt) > CFG.doublePushMs) {
    /* ---- first push ---- */
    pushCount = 1; firstPushAt = now;
    badge.textContent = "👆 1"; badge.style.opacity = "1";
    if (on_dz) dropZone.classList.add("gesture-hover");
    clearTimeout(pushTimer);
    pushTimer = setTimeout(function(){
      pushCount = 0; firstPushAt = null; badge.style.opacity = "0";
      dropZone.classList.remove("gesture-hover");
    }, CFG.doublePushMs);
  } else {
    /* ---- second push = double-push confirmed ---- */
    pushCount = 0; firstPushAt = null;
    clearTimeout(pushTimer);
    dropZone.classList.remove("gesture-hover");
    badge.textContent = "✅"; badge.style.opacity = "1";
    setTimeout(function(){ badge.style.opacity = "0"; }, 700);

    if (on_dz) {
      write("👆 Double-push — opening file picker", "info");
      /*
        Option 1+3 combo:
        Move the ghost <button> + <input> directly under the cursor,
        then fire a real MouseEvent at those exact coordinates.
        The browser sees a genuine pointer interaction on a real
        file input element and allows the picker to open.
      */
      var gb = document.getElementById("ghostPickerBtn");
      var gi = document.getElementById("ghostFileInput");
      /* position the ghost button centered on the cursor */
      gb.style.left          = (pos.x - 30) + "px";
      gb.style.top           = (pos.y - 30) + "px";
      gb.style.width         = "60px";
      gb.style.height        = "60px";
      gb.style.pointerEvents = "auto";
      /* fire a real trusted-looking click directly on the input */
      gi.dispatchEvent(new MouseEvent("click", {
        bubbles: true, cancelable: true,
        clientX: pos.x, clientY: pos.y,
        view: window
      }));
      /* hide ghost again after a tick */
      setTimeout(function(){
        gb.style.pointerEvents = "none";
        gb.style.width  = "1px";
        gb.style.height = "1px";
      }, 500);
    } else {
      fireClick(pos);
    }
  }
}

function fireClick(pos) {
  var x = pos.x, y = pos.y;
  var rip = el("gRipple");
  rip.style.display = "block"; rip.style.left = x+"px"; rip.style.top = y+"px";
  rip.style.opacity = "1"; rip.style.transition = "none";
  rip.style.transform = "translate(-50%,-50%) scale(0)";
  requestAnimationFrame(function(){
    rip.style.transition = "transform .38s ease-out, opacity .38s ease-out";
    rip.style.transform  = "translate(-50%,-50%) scale(1)";
    rip.style.opacity    = "0";
  });
  setTimeout(function(){ rip.style.display = "none"; }, 420);
  var target = document.elementFromPoint(x, y);
  if (target) {
    target.dispatchEvent(new MouseEvent("click",{ bubbles:true, cancelable:true, clientX:x, clientY:y }));
    write("👆 Click → " + target.tagName.toLowerCase() + (target.id?"#"+target.id:""), "info");
  }
}

function handleGesture(gesture, pos, lm) {
  var cursor = el("gCursor");
  var label  = el("gLabel");
  var debug  = el("gDebug");
  var on_dz  = overDropZone(pos.x, pos.y);

  cursor.style.left = pos.x + "px";
  cursor.style.top  = pos.y + "px";
  debug.textContent = gesture.toUpperCase();

  if (on_dz && !dropZone.classList.contains("file-ready")) {
    dropZone.classList.add("gesture-hover");
  } else if (!on_dz) {
    dropZone.classList.remove("gesture-hover");
  }

  if (gesture === "point") {
    if (detectPush(lm)) onPush(pos);
  } else {
    lastWristZ = lm[0].z;
    if (gesture !== "fist") pushCount = 0;
  }

  if (gesture === "fist") {
    grabCount++; sendCount = 0;
    cursor.style.background = "rgba(255,77,109,.9)";
    cursor.style.boxShadow  = "0 0 18px rgba(255,77,109,.8)";
    cursor.style.transform  = "translate(-50%,-50%) scale(1.4)";
    if (grabCount >= CFG.grabFrames && !isGrabbing) {
      if (gestureState.filesReady) {
        isGrabbing = true; hasSent = false;
        label.textContent = "✊ Grabbed! Open fist to send";
        write("✊ Grabbed — open fist to send!", "info");
      } else {
        label.textContent = "⚠️ Pick a file first";
      }
    }
  } else if (gesture === "open" && isGrabbing) {
    sendCount++; grabCount = 0;
    cursor.style.background = "rgba(74,222,128,.9)";
    cursor.style.boxShadow  = "0 0 18px rgba(74,222,128,.8)";
    cursor.style.transform  = "translate(-50%,-50%) scale(1.6)";
    if (sendCount >= CFG.sendFrames && !hasSent) {
      hasSent = true; isGrabbing = false;
      label.textContent = "🚀 Sending!";
      gestureSendFiles();
      setTimeout(function(){
        cursor.style.transform = "translate(-50%,-50%) scale(1)";
        label.textContent = "👆 Point to aim";
      }, 1200);
    }
  } else {
    grabCount = 0; sendCount = 0;
    cursor.style.background = "rgba(120,220,255,.82)";
    cursor.style.boxShadow  = "0 0 14px rgba(120,220,255,.8)";
    cursor.style.transform  = "translate(-50%,-50%) scale(1)";
    if      (isGrabbing)              label.textContent = "✊ Holding — open to send";
    else if (gestureState.filesReady) label.textContent = "✊ Fist to grab & send";
    else if (on_dz)                   label.textContent = "👆👆 Double-push to pick file";
    else                              label.textContent = "👆 Point to aim";
  }
}

function drawSkeleton(canvas, lm, gesture) {
  var ctx = canvas.getContext("2d");
  var w = canvas.width, h = canvas.height;
  ctx.fillStyle = "#000"; ctx.fillRect(0,0,w,h);
  var color = gesture==="fist" ? "#ff4d6d" : gesture==="open" ? "#4ade80" : "#78dcff";
  var bones = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
               [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
               [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
  ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.shadowColor=color; ctx.shadowBlur=8; ctx.globalAlpha=0.9;
  bones.forEach(function(b){
    ctx.beginPath(); ctx.moveTo(lm[b[0]].x*w,lm[b[0]].y*h); ctx.lineTo(lm[b[1]].x*w,lm[b[1]].y*h); ctx.stroke();
  });
  ctx.shadowBlur=14;
  lm.forEach(function(p,i){
    ctx.beginPath(); ctx.arc(p.x*w,p.y*h,i===8?7:4,0,Math.PI*2);
    ctx.fillStyle=i===8?"#fff":color; ctx.globalAlpha=1; ctx.fill();
  });
  ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function buildUI() {
  /* preview box */
  var box = document.createElement("div");
  box.id = "gBox";
  box.style.cssText = "position:fixed;bottom:20px;right:20px;width:220px;height:165px;" +
    "border-radius:12px;overflow:hidden;border:2px solid rgba(120,220,255,.32);" +
    "background:#000;z-index:1000;box-shadow:0 4px 24px rgba(0,0,0,.6);";

  var vid = document.createElement("video");
  vid.id="gVideo"; vid.autoplay=true; vid.playsInline=true; vid.muted=true;
  vid.style.cssText="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;";

  var cvs = document.createElement("canvas");
  cvs.id="gCanvas";
  cvs.style.cssText="position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1);background:#000;";

  var flash = document.createElement("div");
  flash.id="gFlash";
  flash.style.cssText="position:absolute;inset:0;background:rgba(120,220,255,.17);border-radius:12px;opacity:0;pointer-events:none;transition:opacity .12s;";

  var badge = document.createElement("div");
  badge.id="gBadge";
  badge.style.cssText="position:absolute;top:5px;left:7px;font-size:11px;color:#78dcff;font-family:sans-serif;opacity:0;transition:opacity .18s;";

  var debug = document.createElement("div");
  debug.id="gDebug";
  debug.style.cssText="position:absolute;top:5px;right:6px;font-size:10px;color:rgba(255,255,255,.32);font-family:sans-serif;";

  var label = document.createElement("div");
  label.id="gLabel";
  label.style.cssText="position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:11px;color:#78dcff;font-family:sans-serif;text-shadow:0 1px 3px #000;";
  label.textContent="Click ✋ to start";

  [vid,cvs,flash,badge,debug,label].forEach(function(n){ box.appendChild(n); });
  document.body.appendChild(box);

  /* toggle button */
  var btn = document.createElement("button");
  btn.id="gToggle"; btn.textContent="✋ Gesture OFF";
  btn.style.cssText="position:fixed;bottom:196px;right:20px;padding:8px 16px;" +
    "background:rgba(120,220,255,.1);border:1px solid rgba(120,220,255,.32);" +
    "border-radius:8px;color:#78dcff;font-size:13px;cursor:pointer;z-index:1001;font-weight:600;";
  btn.addEventListener("click", toggleGesture);
  document.body.appendChild(btn);

  /* cursor dot */
  var cur = document.createElement("div");
  cur.id="gCursor";
  cur.style.cssText="position:fixed;width:26px;height:26px;border-radius:50%;" +
    "background:rgba(120,220,255,.85);border:2px solid #fff;pointer-events:none;" +
    "z-index:9999;transform:translate(-50%,-50%);display:none;" +
    "box-shadow:0 0 14px rgba(120,220,255,.9);transition:background .1s,box-shadow .1s,transform .12s;";
  document.body.appendChild(cur);

  /* ripple */
  var rip = document.createElement("div");
  rip.id="gRipple";
  rip.style.cssText="position:fixed;width:66px;height:66px;border-radius:50%;" +
    "border:3px solid rgba(120,220,255,.85);pointer-events:none;z-index:9998;" +
    "transform:translate(-50%,-50%) scale(0);display:none;opacity:0;";
  document.body.appendChild(rip);
}

async function startGesture() {
  var vid    = el("gVideo");
  var canvas = el("gCanvas");
  var cursor = el("gCursor");
  var label  = el("gLabel");

  /* camera */
  try {
    var stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:"user", width:640, height:480 } });
    vid.srcObject = stream;
    await new Promise(function(resolve){ vid.onloadedmetadata = resolve; });
    canvas.width  = vid.videoWidth  || 640;
    canvas.height = vid.videoHeight || 480;
  } catch(err) {
    label.textContent = "Camera error ❌";
    write("Camera: " + err.message, "error");
    /* re-enable toggle so user can retry */
    el("gToggle").textContent = "✋ Gesture OFF";
    el("gToggle").style.background = "rgba(120,220,255,.1)";
    return;
  }

  label.textContent = "Loading model...";

  var hands = new Hands({
    locateFile: function(f){ return "/mediapipe/" + f; }
  });

  hands.setOptions({
    maxNumHands:            1,
    modelComplexity:        1,
    minDetectionConfidence: CFG.minDetection,
    minTrackingConfidence:  CFG.minTracking
  });

  hands.onResults(function(res) {
    if (!running) return;
    var ctx = canvas.getContext("2d");
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
      var lm      = res.multiHandLandmarks[0];
      var gesture = classify(lm);
      var pos     = smoothCursor(lm);
      drawSkeleton(canvas, lm, gesture);
      cursor.style.display = "block";
      handleGesture(gesture, pos, lm);
    } else {
      ctx.fillStyle="#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
      cursor.style.display = "none";
      el("gDebug").textContent = "";
      label.textContent = "🖐️ Show your hand";
      dropZone.classList.remove("gesture-hover");
      grabCount=0; sendCount=0; lastWristZ=null; isGrabbing=false;
    }
  });

  /* CRITICAL: initialize model before starting camera feed */
  await hands.initialize();

  var camera = new Camera(vid, {
    onFrame: async function(){ if (running) await hands.send({ image:vid }); },
    width: 640, height: 480
  });

  camera.start();
  running = true;
  label.textContent        = "👆 Point to aim";
  cursor.style.display     = "block";
  el("gToggle").textContent      = "✋ Gesture ON";
  el("gToggle").style.background = "rgba(120,220,255,.22)";
  write("Gesture control active ✔", "success");
}

function toggleGesture() {
  if (!running) {
    /* disable button while loading to prevent double-click */
    el("gToggle").textContent      = "Loading...";
    el("gToggle").style.background = "rgba(120,220,255,.08)";
    startGesture();
  } else {
    running = false;
    el("gCursor").style.display    = "none";
    el("gLabel").textContent       = "Gesture OFF";
    el("gToggle").textContent      = "✋ Gesture OFF";
    el("gToggle").style.background = "rgba(120,220,255,.1)";
    write("Gesture OFF", "info");
  }
}

window.addEventListener("DOMContentLoaded", buildUI);

})();
</script>
